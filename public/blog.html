<body class="bg-background-dark text-white">

<!-- Navbar -->
<nav class="fixed top-0 left-0 right-0 z-50 glass-nav">
<div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
  <a href="/" class="flex items-center gap-2">
    <div class="size-10 bg-primary rounded-lg flex items-center justify-center"><span class="text-background-dark font-black text-xl">M</span></div>
    <h2 class="text-xl font-extrabold tracking-tight">MHR</h2>
  </a>
  <div class="hidden md:flex items-center gap-10">
    <a class="text-sm font-medium hover:text-primary transition-colors" href="/">Home</a>
    <a class="text-sm font-medium hover:text-primary transition-colors" href="/about">About</a>
    <a class="text-sm font-medium text-primary border-b-2 border-primary pb-1" href="/blog">Blog</a>
    <a class="text-sm font-medium hover:text-primary transition-colors" href="/#contact">Contact</a>
  </div>
  <a href="/#contact" class="hidden sm:block bg-primary hover:bg-primary/90 text-background-dark font-bold py-2.5 px-6 rounded-lg text-sm transition-all shadow-lg shadow-primary/20">Hire Me</a>
</div>
</nav>

<!-- Hero -->
<section class="pt-40 pb-16 px-6">
<div class="max-w-7xl mx-auto">
  <h2 class="text-primary font-bold tracking-widest uppercase text-sm mb-3">Journal</h2>
  <h1 class="text-5xl md:text-6xl font-black mb-6">Insights & <span class="text-primary">Articles</span></h1>
  <p class="text-muted text-lg max-w-xl leading-relaxed">Thoughts on design, digital marketing, and growing businesses in the modern age.</p>
</div>
</section>

<!-- Blog Grid -->
<section class="pb-32 px-6">
<div class="max-w-7xl mx-auto">
  <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <!-- Loading skeleton -->
    <div class="bg-surface rounded-2xl border border-white/5 overflow-hidden animate-pulse h-72"></div>
    <div class="bg-surface rounded-2xl border border-white/5 overflow-hidden animate-pulse h-72"></div>
    <div class="bg-surface rounded-2xl border border-white/5 overflow-hidden animate-pulse h-72"></div>
  </div>
</div>
</section>

<!-- Footer -->
<footer class="border-t border-white/5 py-10 text-center text-muted text-sm">

<!-- WhatsApp -->
<a href="https://wa.me/8801786029947" target="_blank" rel="noopener noreferrer" class="fixed bottom-6 right-6 z-50 bg-[#25D366] hover:bg-[#20bd5a] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-all duration-300">

</a>

<script>
(async function() {
  const grid = document.getElementById('blog-grid');
  try {
    const res = await fetch('/api/blogs');
    const blogs = await res.json();
    if (!Array.isArray(blogs) || blogs.length === 0) {
      grid.innerHTML = '<p class="text-muted text-center col-span-3 py-20 text-lg">No blog posts yet. Check back soon!</p>';
      return;
    }
    grid.innerHTML = blogs.map(b => {
      const date = new Date(b.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
      const excerpt = b.content.replace(/<[^>]+>/g, '').substring(0, 120) + '...';
      return `
        <a href="/blog/${b.slug}" class="blog-card bg-surface rounded-2xl border border-white/5 overflow-hidden group block">
          ${b.featuredImage
            ? `<div class="aspect-[4/3] lg:aspect-[12/5] overflow-hidden"><img src="${b.featuredImage}" alt="${b.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/></div>`
            : `<div class="aspect-[4/3] lg:aspect-[12/5] bg-primary/5 flex items-center justify-center"><span class="material-symbols-outlined text-primary/30 text-6xl">article</span></div>`
          }
          <div class="p-6">
            <p class="text-primary text-xs font-bold uppercase tracking-widest mb-3">${date}</p>
            <h3 class="text-xl font-black text-white mb-3 leading-snug group-hover:text-primary transition-colors">${b.title}</h3>
            <p class="text-muted text-sm leading-relaxed mb-4">${excerpt}</p>
            <span class="text-primary text-sm font-bold flex items-center gap-1">Read More <span class="material-symbols-outlined text-base">arrow_forward</span></span>
          </div>
        </a>`;
    }).join('');
  } catch(e) {
    grid.innerHTML = '<p class="text-muted text-center col-span-3 py-20">Could not load blog posts.</p>';
  }
})();
</script>
</body>
</html>
